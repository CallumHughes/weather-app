name: weather-app

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    init: true
    ports:
      - "3001:3001"
    env_file:
      - path: apps/web/.env
        required: false
    environment:
      INTERNAL_SERVER_URL: http://server:3000
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    image: weather-app-server
    init: true
    # Deliberately not published to the host: the browser reaches the API
    # through the web app's BFF proxy, and web reaches it over the compose
    # network (http://server:3000). Publishing it would let clients hit the
    # API directly, bypassing the proxy (see ARCHITECTURE.md → API hardening).
    env_file:
      - path: apps/server/.env
        required: false
    environment:
      CORS_ORIGIN: http://localhost:3001
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/weather-app
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # One-shot: applies pending Prisma migrations before the server starts.
  # Reuses the server image (it contains the workspace and the prisma CLI);
  # `prisma migrate deploy` only applies committed migrations, never creates
  # or resets anything, so it is safe to run on every `docker compose up`.
  migrate:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    image: weather-app-server
    working_dir: /app
    command: ["pnpm", "--filter", "@weather-app/db", "run", "db:migrate:deploy"]
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/weather-app
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  postgres:
    image: postgres
    container_name: weather-app-postgres
    environment:
      POSTGRES_DB: weather-app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - weather-app_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  weather-app_postgres_data:
